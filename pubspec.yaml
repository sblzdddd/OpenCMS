name: opencms
description: "An open-source and cross-platform CMS Dashboard APP for a certain school."
publish_to: "none"

version: 1.1.0+7

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  web: ^1.1.1
  flutter_inappwebview: 6.2.0-beta.3
  flutter_secure_storage: ^10.0.0-beta.5
  flutter_secure_storage_web: ^2.0.0
  material_symbols_icons: ^4.2892.0
  html: ^0.15.6
  window_manager: ^0.5.1
  app_links: ^7.0.0
  tray_manager: ^0.5.2
  dio: ^5.9.0
  dio_cookie_manager: ^3.3.0
  cookie_jar: ^4.0.8
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  provider: ^6.1.5
  google_fonts: ^6.3.3
  flutter_acrylic: ^1.1.4
  dio_cache_interceptor: ^4.0.5
  add_2_calendar: ^3.0.1
  syncfusion_flutter_calendar: ^31.2.18
  flutter_launcher_icons: ^0.14.4
  syncfusion_flutter_charts: ^31.2.18
  flutter_colorpicker: ^1.1.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  syncfusion_flutter_core: ^31.2.18
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  share_plus: ^12.0.1
  file_picker: ^10.3.7
  archive: ^4.0.7
  # home_widget: ^0.8.1
  dynamic_color: ^1.8.1
  pretty_dio_logger: ^1.4.0
  get_it: ^8.3.0
  json_annotation: ^4.9.0
  logging: ^1.3.0
  device_info_plus: ^10.1.0
  flutter_phoenix: ^1.1.1
  silky_scroll: ^1.0.16
  synchronized: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.12
  build_runner: ^2.10.4
  json_serializable: ^6.11.3

msix_config:
  display_name: OpenCMS
  publisher_display_name: hansdnv
  identity_name: hansdnv.OpenCMS
  publisher: CN=1B9E4830-7276-485F-922F-5404D3F0FDB4
  msix_version: 0.0.0.0
  logo_path: assets/icon/Full/OCMS_ICON_256.png
  store: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/default-login-bg.jpg
    - assets/icon/Full/OCMS_ICON_256.png
    - assets/icon/
    - assets/langs/
    - LICENSE

  shaders:
    - assets/shaders/mesh_gradient.frag
    - assets/shaders/waves.frag
